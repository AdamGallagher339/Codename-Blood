<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Blood Bike - Real-time Delivery Coordination</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#dc143c">
  <meta name="description" content="Blood Bike - Real-time blood delivery coordination and logistics platform for riders and coordinators">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Blood Bike">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- Apple Icons -->
  <link rel="apple-touch-icon" href="icons/favicon-192.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-96x96.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/favicon-192.png">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <!-- Splash screen – shown instantly, faded out by Angular -->
  <div id="splash-screen">
    <img src="icons/logo.png" alt="Blood Bike" class="splash-logo">
  </div>
  <style>
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #dc143c;
      transition: opacity 0.6s ease-out;
    }
    #splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .splash-logo {
      width: 160px;
      height: 160px;
      object-fit: contain;
      animation: splash-pulse 1.4s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.08); opacity: 1; }
    }
  </style>

  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
