<div *ngIf="showModal()" class="modal-overlay" (click)="close()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <!-- QR Scanner Modal -->
    <app-qr-scanner 
      *ngIf="showScanner()" 
      (scanComplete)="onScanComplete($event)"
      [returnUrl]="'/'">
    </app-qr-scanner>

    <!-- Event Form -->
    <ng-container *ngIf="!showScanner()">
      <div class="modal-header">
        <h2>Create New Event</h2>
        <button class="close-btn" (click)="close()" aria-label="Close modal">
          ✕
        </button>
      </div>
      
      <form class="event-form" (ngSubmit)="submitEvent()">
        <div class="form-group">
          <label for="title">Event Title *</label>
          <input
            id="title"
            type="text"
            [ngModel]="title()"
            (ngModelChange)="title.set($event)"
            name="title"
            placeholder="Enter event title"
            required
          />
        </div>
        
        <div class="form-group">
          <label for="description">Description</label>
          <textarea
            id="description"
            [ngModel]="description()"
            (ngModelChange)="description.set($event)"
            name="description"
            placeholder="Enter event description"
            rows="3"
          ></textarea>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="date">Date *</label>
            <input
              id="date"
              type="date"
              [ngModel]="date()"
              (ngModelChange)="date.set($event)"
              name="date"
              required
            />
          </div>
          
          <div class="form-group">
            <label for="startTime">Start Time *</label>
            <input
              id="startTime"
              type="time"
              [ngModel]="startTime()"
              (ngModelChange)="startTime.set($event)"
              name="startTime"
              required
            />
          </div>
          
          <div class="form-group">
            <label for="endTime">End Time *</label>
            <input
              id="endTime"
              type="time"
              [ngModel]="endTime()"
              (ngModelChange)="endTime.set($event)"
              name="endTime"
              required
            />
          </div>
        </div>
        
        <div class="form-group">
          <label for="location">Location *</label>
          <div class="location-input-group">
            <input
              id="location"
              type="text"
              [ngModel]="location()"
              (ngModelChange)="location.set($event)"
              name="location"
              placeholder="Enter location or scan QR code"
              required
            />
            <button
              type="button"
              class="btn-icon-secondary"
              (click)="openScanner()"
              title="Scan QR code for location"
            >
              📷
            </button>
            <button
              type="button"
              class="btn-icon-secondary"
              [class.btn-icon-active]="showMapPicker()"
              (click)="toggleMapPicker()"
              title="Pick location on map"
            >
              📍
            </button>
          </div>

          <!-- Inline map picker -->
          <div *ngIf="showMapPicker()" class="map-picker-container">
            <div class="map-picker-coord-bar">
              <ng-container *ngIf="lat() !== null && lng() !== null; else noCoord">
                <span class="coord-badge">
                  {{ lat()?.toFixed(5) }}, {{ lng()?.toFixed(5) }}
                </span>
                <button type="button" class="btn-clear-coord" (click)="clearMapLocation()" title="Clear map pin">✕</button>
              </ng-container>
              <ng-template #noCoord>
                <span class="coord-hint">Click on the map to set a waypoint</span>
              </ng-template>
            </div>
            <div id="event-map-picker" class="map-picker"></div>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="type">Event Type *</label>
            <select
              id="type"
              [ngModel]="type()"
              (ngModelChange)="type.set($event)"
              name="type"
              required
            >
              <option *ngFor="let eventType of eventTypes" [value]="eventType.value">
                {{ eventType.icon }} {{ eventType.label }}
              </option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="priority">Priority *</label>
            <select
              id="priority"
              [ngModel]="priority()"
              (ngModelChange)="priority.set($event)"
              name="priority"
              required
            >
              <option *ngFor="let p of priorities" [value]="p.value">
                {{ p.label }}
              </option>
            </select>
          </div>
        </div>
        
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" (click)="close()">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="!isFormValid()">
            Create Event
          </button>
        </div>
      </form>
    </ng-container>
  </div>
</div>
